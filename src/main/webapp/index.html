<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parkezzz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e8f5e9, #f0f4f8);
    }
    .card {
      background: white;
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    h1 { color: #2d6a4f; font-size: 2.5rem; margin-bottom: 0.5rem; }
    p  { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
    form { display: flex; gap: 0.5rem; }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 2px solid #cde0d6;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #2d6a4f; }
    button {
      padding: 0.75rem 1.5rem;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1b4332; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello World</h1>
    <p>Welcome to Parkezzz. Say hello to someone!</p>
    <form action="hello" method="get">
      <input type="text" name="name" placeholder="Enter a name..." autofocus>
      <button type="submit">Go</button>
    </form>
  </div>
</body>
</html>
